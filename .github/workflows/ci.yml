name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -c "import json; json.load(open('data/finance_guide.json')); json.load(open('data/shopping_guide.json')); print('JSON OK')"
      - run: python -c "import app; print('app import OK')"
