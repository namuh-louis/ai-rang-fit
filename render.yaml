# Render Blueprint — GitHub 연결 후 자동 배포
# https://dashboard.render.com → New → Blueprint → 이 저장소 선택

services:
  - type: web
    name: ai-rang-fit
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
